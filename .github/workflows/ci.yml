name: ci

# Proves the SAME models that run locally run in CI, fully on fixtures, no AWS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check ingestion dashboard tests
      - name: Unit tests (no DB)
        run: .venv/bin/python -m pytest tests/test_storage.py -q

  pipeline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: analytics
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U analytics" --health-interval 5s
          --health-timeout 5s --health-retries 10
    # MinIO runs as a step (below), not a service: the official image needs a
    # `server /data` command, which GitHub `services:` can't pass. Pinned to the same
    # image as docker-compose (bitnami/minio:latest was removed in Bitnami's 2025 Hub
    # migration — manifest unknown).
    env:
      # Host-side endpoints (service ports are mapped to localhost on the runner).
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      S3_LANDING_BUCKET: rag-bench-landing
      LOCAL_SOURCE_DIR: ./ingestion_sample
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      RAW_SCHEMA: raw
      DBT_SCHEMA: analytics
      DBT_TARGET: local
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dbt,dev]"
      - name: dbt profile
        run: cp dbt/profiles.example.yml dbt/profiles.yml
      - name: Start MinIO (same pinned image as docker-compose)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-04-08T15-41-24Z server /data
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/live >/dev/null && { echo "minio ready"; break; }
            sleep 2
          done
      - name: Seed object storage (creates buckets + uploads fixtures)
        run: .venv/bin/python -m ingestion.seed_storage
      - name: Extract + load raw
        run: .venv/bin/python -m ingestion
      - name: dbt build (run + test + contracts)
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
        run: ../.venv/bin/dbt build --target local
      - name: Idempotency integration test
        run: .venv/bin/python -m pytest tests/test_load_raw_integration.py -q
