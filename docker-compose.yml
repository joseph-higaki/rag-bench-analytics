# Local stack: Postgres (warehouse) + Postgres (Airflow metadata) + MinIO (S3-compatible
# landing zone). Two separate Postgres instances — same discipline as prod, where they'd
# be on different hosts. `docker compose up` + `make pipeline` runs the whole chain
# offline, no AWS account (CLAUDE.md rule #4). Airflow is optional and behind the
# `airflow` profile — the pipeline does not require it (Makefile runs the chain directly);
# it's kept for the orchestration skill, not the cadence.
name: rag-bench-analytics

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analytics}
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
    ports:
      - "127.0.0.1:5432:5432"   # localhost-only; never bind 0.0.0.0 in dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analytics} -d ${POSTGRES_DB:-analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-airflow:
    profiles: ["airflow"]
    image: postgres:16
    environment:
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    ports:
      - "127.0.0.1:5433:5432"   # 5433 to avoid collision with the analytics instance
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the landing bucket, then exit. (Marts are served direct from
  # Postgres — no Parquet bucket; ADR-001.)
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb -p local/${S3_LANDING_BUCKET:-rag-bench-landing} &&
      echo 'landing bucket ready'
      "

  # ── Airflow (optional): `docker compose --profile airflow up` ──
  airflow:
    profiles: ["airflow"]
    build: ./airflow
    depends_on:
      postgres:
        condition: service_healthy
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Cosmos renders the dbt project at DAG-parse time (`dbt ls`), which blows past the
      # default 30s import budget on a cold parse — the DAG then fails to load. Raise both
      # parse timeouts. (Production-grade alternative: pre-generate a dbt manifest + Cosmos
      # LoadMode.DBT_MANIFEST so dbt isn't run at parse — a later ADR-002 follow-up.)
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "180"
      AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: "180"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@postgres-airflow:5432/${AIRFLOW_DB:-airflow}
      # Make the mounted `ingestion` package importable from PythonOperator tasks —
      # Airflow only auto-adds dags/plugins/config to sys.path, not $AIRFLOW_HOME itself.
      PYTHONPATH: /opt/airflow
      # The pipeline tasks read these to reach the warehouse + object storage.
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
      # UI admin login, pre-created by the command below (see note there).
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./ingestion:/opt/airflow/ingestion:ro
      - ./dbt:/opt/airflow/dbt              # read-write: dbt writes to target/ and logs/
    # Ensure profiles.yml exists (make setup creates it on the host; this covers
    # the case where someone starts Airflow before running make setup).
    # Seed the admin login from AIRFLOW_ADMIN_* BEFORE `airflow standalone`, which
    # otherwise mints its own *random* password when no "admin" user exists (verified
    # in create_admin_standalone). Two steps, because `users create` exits 0 on an
    # existing user and so CANNOT update a password: `create` guarantees the user
    # exists (fresh volume), then `reset-password` authoritatively sets it to the .env
    # value on EVERY boot — even a pre-existing volume that already holds a random-
    # password admin. `$$` escapes compose interpolation so the in-container shell
    # expands it; `|| true` keeps the chain going to standalone. Username must stay
    # "admin" to match standalone's hardcoded check.
    command: >-
      bash -c "cp -n /opt/airflow/dbt/profiles.example.yml /opt/airflow/dbt/profiles.yml 2>/dev/null || true
      && airflow db migrate
      && (airflow users create --role Admin --username \"$${AIRFLOW_ADMIN_USER}\" --password \"$${AIRFLOW_ADMIN_PASSWORD}\" --firstname admin --lastname user --email admin@example.com || true)
      && (airflow users reset-password --username \"$${AIRFLOW_ADMIN_USER}\" --password \"$${AIRFLOW_ADMIN_PASSWORD}\" || true)
      && airflow standalone"

volumes:
  postgres-data:
  postgres-airflow-data:
  minio-data:
