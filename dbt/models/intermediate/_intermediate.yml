version: 2

models:
  - name: int_scored_answers_enriched
    description: >
      Per-answer grain (run x question) joined with question, run, traversal, and the
      conformed pricing relation (int_model_pricing). Ephemeral — exists only to compose
      the marts. Carries both natural keys (for building dim FKs) and all measures including cost.

  - name: int_model_pricing
    description: >
      Conformed token-pricing contract: the flattened Portkey snapshot (stg_model_pricing_portkey)
      UNION a curated override for models Portkey can't price (local Ollama = $0). No source toggle —
      a different source is added as a new raw source + staging model. Rates are USD per 1M tokens
      (unit conversion happens upstream, never here). Unmatched models -> NULL cost downstream, never
      fabricated.
    columns:
      - name: model_resolved
        tests: [not_null, unique]   # current grain; gains effective_date when SCD pricing lands
      - name: rate_unit
        tests:
          - accepted_values:
              arguments:
                values: ['usd_per_mtok']
      - name: pricing_source
        tests:
          - accepted_values:
              arguments:
                values: ['portkey', 'override']
