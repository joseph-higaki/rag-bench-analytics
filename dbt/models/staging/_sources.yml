version: 2

sources:
  - name: raw
    description: >
      Landing zone written by the Python ingestion layer. JSONB payloads kept as-is
      from the benchmark's append-only run files. dbt only reads here; never writes.
    schema: "{{ env_var('RAW_SCHEMA', 'raw') }}"
    # Freshness on the S3-landed raw: a run that hasn't refreshed in 2 days warns,
    # 7 days errors. loaded_at is set by the loader, not the benchmark.
    freshness:
      warn_after: {count: 2, period: day}
      error_after: {count: 7, period: day}
    loaded_at_field: loaded_at
    tables:
      - name: run_manifest
        description: One row per run — run-level metadata (generator, judge, corpus, timestamp).
        columns:
          - name: run_id
            tests: [not_null, unique]
      - name: scored_answer
        description: One row per (run, question) — the per-answer record with polymorphic traversal_info.
        # No freshness here: same loaded_at semantics as run_manifest; checking once is enough.
        freshness: null
        columns:
          - name: run_id
            tests: [not_null]
          - name: question_id
            tests: [not_null]
      - name: question
        description: Shared question bank (questions.jsonl), full-refreshed each load.
        freshness: null
        columns:
          - name: question_id
            tests: [not_null, unique]
      - name: corpus_profile
        description: >
          One row per corpus build (<corpus_build_id>.json) — graph/vector size metrics
          measured by the benchmark. Content-addressed: rebuilt corpus => new id => new row.
        # No freshness: content-addressed and rarely changes (unlike run/manifest landings).
        freshness: null
        columns:
          - name: corpus_build_id
            tests: [not_null, unique]
      - name: model_pricing
        description: >
          External (non-benchmark) model token-pricing snapshots — one row per provider, payload
          is the upstream catalog as-is (Portkey's pricing/<provider>.json). The first non-benchmark
          input; flattened + unit-converted (cents/token -> usd_per_mtok) in stg_model_pricing_portkey.
        # No freshness: third-party reference, refreshed out-of-band (~monthly), not per run.
        freshness: null
        columns:
          - name: provider
            tests: [not_null, unique]
