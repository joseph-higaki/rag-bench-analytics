version: 2

models:
  - name: stg_runs
    description: One row per run; flattened manifest metadata.
    columns:
      - name: run_id
        tests: [not_null, unique]
      - name: generator_provider
        tests:
          - accepted_values:
              arguments:
                values: ['anthropic', 'ollama']

  - name: stg_scored_answers
    description: >
      One row per (run, question); typed per-answer measures. Grain uniqueness is
      enforced downstream by the unique test on fct_scored_answer's surrogate key.
    columns:
      - name: run_id
        tests: [not_null]
      - name: question_id
        tests: [not_null]
      - name: retriever
        tests:
          - accepted_values:
              arguments:
                values: ['closed_book', 'vector', 'graph_neighborhood',
                         'graph_neighborhood_1hop', 'graph_neighborhood_2hop', 'graph_sparqlgen']
      - name: scoring
        tests:
          - accepted_values:
              arguments:
                values: ['string_match', 'set_match', 'numerical', 'binary', 'boolean', 'semantic']
      # score / passed are intentionally NOT not_null: they are null on error records.

  - name: stg_traversal
    description: Exploded traversal_info, conformed to mechanism-aware columns. One row per (run, question).
    columns:
      - name: run_id
        tests: [not_null]
      - name: question_id
        tests: [not_null]
      - name: mechanism
        tests:
          - accepted_values:
              arguments:
                values: ['dense', 'neighborhood', 'sparqlgen', 'none']

  - name: stg_questions
    description: Flattened question bank; question_hop_count parsed from type_id.
    columns:
      - name: question_id
        tests: [not_null, unique]
      - name: question_hop_count
        tests:
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]
                quote: false

  - name: stg_corpus_profile
    description: Flattened corpus profile; one row per corpus_build_id. Graph counts null for smoke.
    columns:
      - name: corpus_build_id
        tests: [not_null, unique]
      # Vector counts are always emitted (every profile measures the vector store). The honest
      # place for not_null: at the dim these are null for the unprofiled/older-run corpus member.
      - name: paper_count
        tests: [not_null]
      - name: chunk_count
        tests: [not_null]
      - name: word_count
        tests: [not_null]

  - name: stg_model_pricing_portkey
    description: >
      Portkey pricing snapshot flattened to one row per model, conformed to the pricing contract.
      Cents/token -> usd_per_mtok (x1e4) happens here; pay_as_you_go tier only (batch ignored). The
      singular test assert_portkey_reconciles_seed asserts these equal the curated seed where they overlap.
    columns:
      - name: model_resolved
        tests: [not_null, unique]
