version: 2

models:
  # ───────────────────────── FACT (contracted) ─────────────────────────
  # Contract enforced: the Streamlit dashboard reads this table directly (read-only role)
  # and depends on these exact column names/types. A schema drift here should fail the
  # build, not the dashboard. (Dims use tests rather than enforced contracts — see
  # the project note: scoping strict contracts to the fact limits unverifiable type
  # fragility while protecting the surface the dashboard actually binds to.)
  - name: fct_scored_answer
    description: >
      One scored answer = run × question. Surrogate-keys-only: a PK + FKs to all dims +
      measures + cost. Natural keys and condition knobs live in their dimensions (ADR-003).
    config:
      contract: {enforced: true}
    columns:
      - name: scored_answer_sk
        data_type: text
        constraints: [{type: not_null}]
        tests: [unique]
      - name: run_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_run')
                field: run_sk
      - name: question_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_sk
      - name: generator_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_generator')
                field: generator_sk
      - name: retriever_cond_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_retriever_cond')
                field: retriever_cond_sk
      - name: writer_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_writer')
                field: writer_sk
      - name: scoring_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_scoring')
                field: scoring_sk
      - name: corpus_sk
        data_type: text
        tests:
          - relationships:
              arguments:
                to: ref('dim_corpus')
                field: corpus_sk
      - name: score
        data_type: numeric
      - name: is_passed
        data_type: boolean
      - name: is_judged
        data_type: boolean
      - name: is_error
        data_type: boolean
      - name: generator_input_tokens
        data_type: bigint
      - name: generator_output_tokens
        data_type: bigint
      - name: generator_cache_read_tokens
        data_type: bigint
      - name: generator_cache_creation_tokens
        data_type: bigint
      - name: generator_total_tokens
        data_type: bigint
      - name: context_tokens_proxy
        data_type: bigint
      - name: num_sources
        data_type: integer
      - name: retrieval_latency_ms
        data_type: numeric
      - name: generation_latency_ms
        data_type: numeric
      - name: total_latency_ms
        data_type: numeric
      - name: neighborhood_num_triples
        data_type: integer
      - name: neighborhood_num_linked
        data_type: integer
      - name: dense_num_chunks
        data_type: integer
      - name: writer_input_tokens
        data_type: bigint
      - name: writer_output_tokens
        data_type: bigint
      - name: writer_total_tokens
        data_type: bigint
      - name: is_sparql_valid
        data_type: boolean
      - name: sparql_num_rows
        data_type: integer
      - name: generator_cost_usd
        data_type: numeric
      - name: writer_cost_usd
        data_type: numeric
      - name: total_cost_usd
        data_type: numeric

  # ───────────────────────── DIMENSIONS ─────────────────────────
  - name: dim_run
    description: Run-level descriptive attributes. Grain run_id.
    columns:
      - name: run_sk
        tests: [not_null, unique]
      - name: run_id
        tests: [not_null, unique]

  - name: dim_question
    description: Question attributes. Grain question_id.
    columns:
      - name: question_sk
        tests: [not_null, unique]
      - name: question_id
        tests: [not_null, unique]
      - name: question_hop_count
        tests:
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]
                quote: false
      - name: question_text
        description: The question prompt as posed to the generator (verbatim from questions.jsonl).
      - name: ground_truth_answer_text
        description: Ground-truth answer rendered readable; array answers joined ', ' (provenance in ground_truth_json).

  - name: dim_generator
    description: Distinct generator configs (provider × model_id × temperature); model_id conformed.
    columns:
      - name: generator_sk
        tests: [not_null, unique]
      - name: generator_provider
        tests:
          - accepted_values:
              arguments:
                values: ['anthropic', 'ollama']

  - name: dim_retriever_cond
    description: The compared variable — distinct (retriever, mechanism, neighborhood_hops, top_k).
    columns:
      - name: retriever_cond_sk
        tests: [not_null, unique]
      - name: mechanism
        tests:
          - accepted_values:
              arguments:
                values: ['dense', 'neighborhood', 'sparqlgen', 'none']

  - name: dim_writer
    description: SPARQL-writer LLM configs (model × temperature); includes the null-writer member.
    columns:
      - name: writer_sk
        tests: [not_null, unique]
      - name: writer_model_family
        description: Writer model rolled up to its family (snapshot stripped, via model_family macro); null for the null-writer member.

  - name: dim_scoring
    description: Scoring types. Grain scoring.
    columns:
      - name: scoring_sk
        tests: [not_null, unique]
      - name: scoring
        tests: [not_null, unique]

  - name: dim_corpus
    description: >
      Corpus build identity + size metrics (ADR-004). Grain corpus_build_id. Counts are
      null for the unprofiled/older-run member; graph counts additionally null for smoke.
    columns:
      - name: corpus_sk
        tests: [not_null, unique]
      - name: corpus_build_id
        tests: [unique]
      - name: corpus_scale
        description: full | smoke — from the profile, falling back to the id prefix.
      - name: corpus_sha
        description: Short content hash, parsed from corpus_build_id.
      - name: triple_count
        description: Graph triples (null for smoke — no endpoint).
      - name: node_count
        description: Graph nodes (null for smoke).
      - name: edge_count
        description: Graph edges (null for smoke).
      - name: paper_count
        description: Vector-store abstracts (n_abstracts).
      - name: chunk_count
        description: Vector-store chunks (n_chunks).
      - name: word_count
        description: Source words, overlap-free (n_words).
      - name: chunk_size
        description: Chunking build knob (tokens).
      - name: chunk_overlap
        description: Chunking build knob (tokens).
      - name: ttl_bytes
        description: Hetionet TTL size in bytes (graph provenance).
      - name: ttl_sha256
        description: SHA-256 of the source TTL (graph provenance).
      - name: store_bytes
        description: Vector store size in bytes.
      - name: embed_model
        description: Embedding model — FD on the corpus (the build id hashes it), not the retriever.
      - name: corpus_measured_at
        description: When the benchmark profiled this corpus build.
