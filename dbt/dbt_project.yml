name: rag_bench_analytics
version: "0.1.0"
config-version: 2

profile: rag_bench_analytics

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# After every build, (re)grant the dashboard's read-only role on the marts schema.
# Idempotent + re-applied each run because marts are dropped/recreated (see the macro).
on-run-end:
  - "{{ grant_marts_reader() }}"

# The raw schema is owned by the ingestion layer (Python), declared as a source.
# dbt builds into the analytics schema; layers are materialized per the convention
# in CLAUDE.md: staging = views (cheap, re-derivable), marts = tables (the dashboard
# reads these), intermediate = ephemeral (exists only to compose marts).
models:
  rag_bench_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

seeds:
  rag_bench_analytics:
    +schema: seeds
    # Seeds are tiny static lookups. Force full-refresh so a column added/removed in a CSV
    # is reflected automatically: plain `dbt seed` only INSERTs into the existing table and
    # never ALTERs, so a schema change otherwise fails ("column does not exist") until a
    # one-off --full-refresh. This config triggers it on every invocation — CLI, Cosmos,
    # local, cloud — so all paths self-heal uniformly (no orchestrated-only runbook step).
    +full_refresh: true
    seed_model_pricing:
      +column_types:
        input_usd_per_mtok: numeric
        output_usd_per_mtok: numeric
        cache_read_usd_per_mtok: numeric
        cache_write_usd_per_mtok: numeric
    seed_pricing_local_overrides:
      +column_types:
        input_usd_per_mtok: numeric
        output_usd_per_mtok: numeric
        cache_read_usd_per_mtok: numeric
        cache_write_usd_per_mtok: numeric
    # Header-only scaffold today: pin types so an empty seed isn't inferred as integer (text = int join error).
    seed_pricing_model_alias:
      +column_types:
        portkey_model_key: text
        model_resolved: text

